<header class="site-header">
  <div class="wrap topbar">
    <a class="brand" href="{{ `/` | relURL }}">
      <span class="brand-mark">Cuaderno</span>
      <span class="brand-sub">{{ site.Params.tagline }}</span>
    </a>
    <nav class="main-nav" aria-label="Principal">
      {{ range site.Menus.main }}
        <a href="{{ .URL | relURL }}" {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}class="is-active"{{ end }}>
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
